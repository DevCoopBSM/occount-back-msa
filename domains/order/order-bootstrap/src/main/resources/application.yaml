server:
  servlet:
    context-path: /api/v3

spring:
  application:
    name: order-api
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}

jwt:
  access-expiration-time: ${JWT_ACCESS_EXPIRATION_TIME}
  kiosk-expiration-time: ${JWT_KIOSK_EXPIRATION_TIME}
  prefix: ${JWT_PREFIX}
  header: ${JWT_HEADER}
  secret-key: ${JWT_SECRET_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

order:
  timeout-seconds: ${ORDER_TIMEOUT_SECONDS:30}
  async-timeout-buffer-millis: ${ORDER_ASYNC_TIMEOUT_BUFFER_MILLIS:10000}

services:
  item:
    base-url: ${ITEM_SERVICE_BASE_URL:http://localhost:8081/api/v3}
