server:
  servlet:
    context-path: /api/v3

spring:
  application:
    name: item-api
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    listener:
      observation-enabled: true

jwt:
  access-expiration-time: ${JWT_ACCESS_EXPIRATION_TIME}
  kiosk-expiration-time: ${JWT_KIOSK_EXPIRATION_TIME}
  prefix: ${JWT_PREFIX}
  header: ${JWT_HEADER}
  secret-key: ${JWT_SECRET_KEY}

toss:
  api:
    url: ${OCCOUNT_TOSS_API_URL}

app:
  stock-sync:
    cron: ${APP_STOCK_SYNC_CRON:0 */5 * * * *}

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[http.client.requests]": true
  endpoints:
    web:
      exposure:
        include: health,prometheus
