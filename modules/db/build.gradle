plugins {
    id 'java-library'
    id 'org.jetbrains.kotlin.plugin.jpa'
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'tools.jackson.module:jackson-module-kotlin'
    implementation project(':core:core-common')
    implementation project(':domains:item:item-domain')
    implementation project(':domains:item:item-application')
    implementation project(':domains:payment:payment-domain')
    implementation project(':domains:payment:payment-application')
}
