openapi: 3.0.3
info:
  title: Occount Kiosk Backend API
  description: |
    키오스크 결제 시스템 백엔드 API 명세

    ## 인증 방식
    - **AUTHENTICATED**: `Authorization: Bearer <token>` 헤더 필수
    - **OPTIONAL_AUTH**: 토큰이 있으면 회원으로 처리, 없으면 비회원으로 처리. 잘못된 토큰은 401 반환
    - **PERMIT_ALL**: 인증 불필요
    - **ADMIN_ONLY**: 관리자 권한 토큰 필요

    ## 키오스크 헤더
    - `X-Kiosk-Id`: 주문 생성·취소 시 필수. 키오스크 식별자

    ## 토큰 발급
    - 회원: `POST /api/v3/auth/login`
    - 키오스크 사용자: `POST /api/v3/auth/kiosk/login`
    - 발급된 토큰은 응답 `Authorization` 헤더에 포함됨

  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local (API Gateway)

tags:
  - name: Auth
    description: 회원가입 및 로그인
  - name: Member
    description: 회원 정보 조회
  - name: Item
    description: 상품 조회 및 관리
  - name: AriPick
    description: 아리픽 제안 등록/조회/승인/거절/좋아요
  - name: Order
    description: 주문 생성 및 취소
  - name: Wallet
    description: 포인트 잔액 및 충전 내역

paths:
  # ───────────────────────────────────────────────
  # Auth
  # ───────────────────────────────────────────────
  /api/v3/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: 회원가입
      description: 새로운 회원을 등록합니다. (PERMIT_ALL)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberRegisterRequest'
            example:
              user_ci_number: "CI1234567890"
              user_name: "홍길동"
              user_phone: "010-1234-5678"
              user_email: "hong@example.com"
              password: "pass1234"
      responses:
        "201":
          description: 회원가입 성공
        "400":
          description: 요청 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v3/auth/login:
    post:
      tags: [Auth]
      operationId: memberLogin
      summary: 회원 로그인 (이메일/비밀번호)
      description: |
        이메일과 비밀번호로 로그인합니다. (PERMIT_ALL)
        성공 시 `Authorization: Bearer <token>` 응답 헤더로 JWT 토큰을 반환합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberLoginRequest'
            example:
              email: "hong@example.com"
              password: "pass1234"
      responses:
        "201":
          description: 로그인 성공
          headers:
            Authorization:
              description: "Bearer <JWT 토큰>"
              schema:
                type: string
              example: "Bearer eyJhbGciOiJIUzI1NiJ9.xxx"
        "400":
          description: 요청 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: 이메일 또는 비밀번호 불일치

  /api/v3/auth/kiosk/login:
    post:
      tags: [Auth]
      operationId: kioskLogin
      summary: 키오스크 로그인 (바코드/PIN)
      description: |
        학생증 바코드와 PIN 번호로 로그인합니다. (PERMIT_ALL)
        성공 시 `Authorization: Bearer <token>` 응답 헤더로 JWT 토큰을 반환합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KioskLoginRequest'
            example:
              user_barcode: "20240001"
              user_pin: "1234"
      responses:
        "201":
          description: 로그인 성공
          headers:
            Authorization:
              description: "Bearer <JWT 토큰>"
              schema:
                type: string
              example: "Bearer eyJhbGciOiJIUzI1NiJ9.xxx"
        "400":
          description: 요청 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: 바코드 또는 PIN 불일치

  # ───────────────────────────────────────────────
  # Member
  # ───────────────────────────────────────────────
  /api/v3/users/pre-order-info:
    get:
      tags: [Member]
      operationId: getPreOrderInfo
      summary: 주문 전 회원 정보 조회
      description: |
        주문 화면 진입 시 회원 이름과 보유 포인트를 반환합니다. (AUTHENTICATED)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreOrderInfoResponse'
              example:
                user_name: "홍길동"
                point: 3500
        "401":
          description: 인증 실패

  # ───────────────────────────────────────────────
  # Item
  # ───────────────────────────────────────────────
  /api/v3/items:
    get:
      tags: [Item]
      operationId: getAllItems
      summary: 전체 상품 목록 조회
      description: 판매 중인 모든 상품 목록을 반환합니다. (PERMIT_ALL)
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemListResponse'

    post:
      tags: [Item]
      operationId: createItem
      summary: 상품 등록
      description: 새로운 상품을 등록합니다. (ADMIN_ONLY)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        "201":
          description: 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        "403":
          description: 관리자 권한 없음

  /api/v3/items/categories:
    get:
      tags: [Item]
      operationId: getItemCategories
      summary: 상품 카테고리 목록 조회
      description: 상품 카테고리 전체 목록을 반환합니다. (PERMIT_ALL)
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCategoryListResponse'

  /api/v3/items/by-ids:
    get:
      tags: [Item]
      operationId: getItemsByIds
      summary: ID 목록으로 상품 조회
      description: 상품 ID 목록을 받아 해당 상품 정보를 반환합니다. (PERMIT_ALL)
      parameters:
        - name: ids
          in: query
          required: true
          description: 조회할 상품 ID 목록
          schema:
            type: array
            items:
              type: integer
              format: int64
          style: form
          explode: false
          example: "1,2,3"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemLookupListResponse'

  /api/v3/items/search:
    get:
      tags: [Item]
      operationId: searchItems
      summary: 상품명 풀텍스트 검색
      description: |
        MySQL ngram FULLTEXT 인덱스로 상품명을 검색합니다. 활성 상품만 relevance 내림차순으로 반환합니다. (PERMIT_ALL)

        - 빈/공백 쿼리는 빈 배열을 반환합니다.
        - boolean-mode 메타문자(`+ - > < ( ) ~ * " @`)는 sanitize됩니다.
        - ngram_token_size(기본 2) 미만 길이의 쿼리는 결과가 없습니다.
      parameters:
        - name: q
          in: query
          required: true
          description: 검색어
          schema:
            type: string
          example: "초코"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemListResponse'

  /api/v3/items/without-barcode:
    get:
      tags: [Item]
      operationId: getItemsWithoutBarcode
      summary: 바코드 없는 상품 목록 조회
      description: 바코드가 등록되지 않은 상품 목록을 반환합니다. (AUTHENTICATED)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemLookupListResponse'
        "401":
          description: 인증 실패

  /api/v3/items/{barcode}:
    get:
      tags: [Item]
      operationId: getItemByBarcode
      summary: 바코드로 상품 조회
      description: 바코드로 단일 상품 정보를 조회합니다. (PERMIT_ALL)
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
          example: "8801234567890"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemLookupResponse'
        "404":
          description: 상품을 찾을 수 없음

  /api/v3/items/{id}:
    put:
      tags: [Item]
      operationId: updateItem
      summary: 상품 정보 수정
      description: 상품의 이름, 카테고리, 가격, 바코드, 재고를 수정합니다. (ADMIN_ONLY)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdateRequest'
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        "403":
          description: 관리자 권한 없음
        "404":
          description: 상품을 찾을 수 없음

    delete:
      tags: [Item]
      operationId: deleteItem
      summary: 상품 삭제
      description: 상품을 삭제합니다. (ADMIN_ONLY)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: 삭제 성공
        "403":
          description: 관리자 권한 없음
        "404":
          description: 상품을 찾을 수 없음

  # ───────────────────────────────────────────────
  # AriPick
  # ───────────────────────────────────────────────
  /api/v3/ari-pick:
    get:
      tags: [AriPick]
      operationId: getAripickList
      summary: 아리픽 제안 목록 조회
      description: 제안 목록을 조회합니다. (PERMIT_ALL)
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickListResponse'

    post:
      tags: [AriPick]
      operationId: createAripick
      summary: 아리픽 제안 등록
      description: 로그인 사용자가 식약처 typeNSeq 기반으로 제안을 등록합니다. (AUTHENTICATED)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAripickRequest'
      responses:
        "201":
          description: 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickResponse'
        "400":
          description: 매점 물품 수칙 위반
        "503":
          description: 식약처 연동 실패
        "401":
          description: 인증 실패

  /api/v3/ari-pick/foods:
    get:
      tags: [AriPick]
      operationId: searchAripickFoods
      summary: 아리픽 식품 검색
      description: 키워드로 식약처 제품명을 검색합니다. (AUTHENTICATED)
      security:
        - BearerAuth: []
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 검색 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickFoodSearchResponse'
        "503":
          description: 식약처 연동 실패
        "401":
          description: 인증 실패

  /api/v3/ari-pick/blocked-keywords:
    get:
      tags: [AriPick]
      operationId: getAripickBlockedKeywords
      summary: 아리픽 금지 키워드 목록
      description: 관리자가 등록된 금지 키워드를 조회합니다. (ADMIN_ONLY)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickBlockedKeywordListResponse'
        "403":
          description: 관리자 권한 없음

    post:
      tags: [AriPick]
      operationId: createAripickBlockedKeyword
      summary: 아리픽 금지 키워드 등록
      description: 관리자가 금지 키워드를 등록합니다. (ADMIN_ONLY)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAripickBlockedKeywordRequest'
      responses:
        "201":
          description: 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickBlockedKeywordResponse'
        "400":
          description: 금지 키워드가 비어 있음
        "409":
          description: 이미 등록된 금지 키워드
        "403":
          description: 관리자 권한 없음

  /api/v3/ari-pick/blocked-keywords/{keywordId}:
    delete:
      tags: [AriPick]
      operationId: deleteAripickBlockedKeyword
      summary: 아리픽 금지 키워드 삭제
      description: 관리자가 금지 키워드를 삭제합니다. (ADMIN_ONLY)
      security:
        - BearerAuth: []
      parameters:
        - name: keywordId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: 삭제 성공
        "403":
          description: 관리자 권한 없음

  /api/v3/ari-pick/{proposalId}:
    get:
      tags: [AriPick]
      operationId: getAripick
      summary: 아리픽 제안 단일 조회
      description: proposalId로 단일 제안을 조회합니다. (PERMIT_ALL)
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickResponse'
        "404":
          description: 제안을 찾을 수 없음

    delete:
      tags: [AriPick]
      operationId: deleteAripickByUser
      summary: 아리픽 제안 삭제 (작성자)
      description: 로그인 사용자가 본인 제안을 삭제합니다. (AUTHENTICATED)
      security:
        - BearerAuth: []
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: 삭제 성공
        "401":
          description: 인증 실패
        "403":
          description: 본인 제안이 아님
        "404":
          description: 제안을 찾을 수 없음

  /api/v3/ari-pick/{proposalId}/approve:
    patch:
      tags: [AriPick]
      operationId: approveAripick
      summary: 아리픽 제안 승인
      description: 제안을 승인 상태로 변경합니다. (ADMIN_ONLY)
      security:
        - BearerAuth: []
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 승인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickResponse'
        "403":
          description: 관리자 권한 없음
        "404":
          description: 제안을 찾을 수 없음

  /api/v3/ari-pick/{proposalId}/reject:
    patch:
      tags: [AriPick]
      operationId: rejectAripick
      summary: 아리픽 제안 거절
      description: 제안을 거절 상태로 변경합니다. (ADMIN_ONLY)
      security:
        - BearerAuth: []
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 거절 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickResponse'
        "403":
          description: 관리자 권한 없음
        "404":
          description: 제안을 찾을 수 없음

  /api/v3/ari-pick/{proposalId}/pending:
    patch:
      tags: [AriPick]
      operationId: pendingAripick
      summary: 아리픽 제안 검토중 변경
      description: 제안을 검토중 상태로 변경합니다. (ADMIN_ONLY)
      security:
        - BearerAuth: []
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickResponse'
        "403":
          description: 관리자 권한 없음
        "404":
          description: 제안을 찾을 수 없음

  /api/v3/ari-pick/{proposalId}/admin:
    delete:
      tags: [AriPick]
      operationId: deleteAripickByAdmin
      summary: 아리픽 제안 삭제 (관리자)
      description: 관리자가 제안을 삭제합니다. (ADMIN_ONLY)
      security:
        - BearerAuth: []
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: 삭제 성공
        "403":
          description: 관리자 권한 없음
        "404":
          description: 제안을 찾을 수 없음

  /api/v3/ari-pick/{proposalId}/like:
    post:
      tags: [AriPick]
      operationId: toggleAripickLike
      summary: 아리픽 좋아요 토글
      description: 좋아요를 토글합니다. (AUTHENTICATED)
      security:
        - BearerAuth: []
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 토글 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickLikeToggleResponse'
        "401":
          description: 인증 실패
        "404":
          description: 제안을 찾을 수 없음

  /api/v3/ari-pick/stats:
    get:
      tags: [AriPick]
      operationId: getAripickStats
      summary: 아리픽 통계 조회
      description: 아리픽 제안 통계를 조회합니다. (PERMIT_ALL)
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AripickStatsResponse'

  # ───────────────────────────────────────────────
  # Order
  # ───────────────────────────────────────────────
  /api/v3/orders:
    post:
      tags: [Order]
      operationId: createOrder
      summary: 주문 생성
      description: |
        주문을 생성합니다. (OPTIONAL_AUTH)

        - `X-Kiosk-Id` 헤더가 없으면 기본값 `1`을 사용합니다.
        - 토큰이 있으면 회원 주문, 없으면 비회원 주문으로 처리합니다.
        - 요청 즉시 `PROCESSING` 상태로 응답하며, 실제 처리는 비동기로 수행됩니다.
        - 상품 검증, 가격 확정, 재고 차감은 비동기로 처리됩니다.
        - 재고 부족 또는 상품 검증 실패 시 최종 상태는 `FAILED` 입니다.
        - 최종 결과는 `GET /api/v3/orders/{orderId}/stream` (SSE) 로 실시간 수신하거나,
          `GET /api/v3/orders/{orderId}` 를 폴링하여 확인합니다.
      parameters:
        - name: X-Kiosk-Id
          in: header
          required: false
          description: 키오스크 식별자. 없으면 `1`
          schema:
            type: string
            default: "1"
          example: "1"
      security:
        - {}
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
            example:
              items:
                - item_id: 1
                  quantity: 2
      responses:
        "202":
          description: 주문 접수 (PROCESSING)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                order_id: 1001
                status: "PROCESSING"
                failure_reason: null
        "400":
          description: 요청 형식 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: 잘못된 토큰

  /api/v3/orders/{orderId}:
    get:
      tags: [Order]
      operationId: getOrder
      summary: 주문 조회
      description: |
        주문 상태를 단건 조회합니다. (PERMIT_ALL)

        - 재고 부족, 상품 미존재 등 재고 단계 실패는 `FAILED` 로 종료됩니다.
        - 최종 상태: `COMPLETED`, `FAILED`, `CANCELLED`, `COMPENSATION_FAILED`, `TIMED_OUT`
        - 실시간 상태 수신이 필요한 경우 `GET /api/v3/orders/{orderId}/stream` (SSE) 를 사용하세요.
      parameters:
        - name: orderId
          in: path
          required: true
          description: 주문 ID
          schema:
            type: integer
            format: int64
          example: 1001
      security:
        - {}
      responses:
        "200":
          description: 주문 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                order_id: 1001
                status: "COMPLETED"
                failure_reason: null
        "404":
          description: 주문을 찾을 수 없음

  /api/v3/orders/{orderId}/stream:
    get:
      tags: [Order]
      operationId: streamOrder
      summary: 주문 상태 실시간 스트리밍 (SSE)
      description: |
        Server-Sent Events(SSE) 방식으로 주문 상태 변경을 실시간 수신합니다. (PERMIT_ALL)

        - 연결 즉시 현재 주문 상태를 전송합니다.
        - 각 메시지는 `event: <event_type>` 형식으로 전달됩니다.
        - 이벤트 타입은 `order_accepted`, `payment_requested`, `completed`, `failed`, `cancel_requested`, `cancelled`, `timed_out` 중 하나입니다.
        - 주문이 최종 상태(`completed`, `failed`, `cancelled`, `compensation_failed`, `timed_out`)에 도달하면 서버가 연결을 종료합니다.
        - 주문 생성 직후 SSE 연결을 맺어 비동기 처리 결과를 수신하는 용도로 사용합니다.
      parameters:
        - name: orderId
          in: path
          required: true
          description: 주문 ID
          schema:
            type: integer
            format: int64
          example: 1001
      security:
        - {}
      responses:
        "200":
          description: SSE 스트림 연결 성공
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE 메시지는 아래 형식으로 전달됩니다.

                  - `event`: 이벤트 타입
                  - `data`: 이벤트 데이터 (JSON). 정상 이벤트는 `{}`, 실패 이벤트는 `{"failure_reason": "..."}` 포함
              examples:
                accepted:
                  summary: 주문 접수 직후
                  value: |
                    event: order_accepted
                    data: {}

                paymentRequested:
                  summary: 결제 요청 단계
                  value: |
                    event: payment_requested
                    data: {}

                completed:
                  summary: 주문 완료
                  value: |
                    event: completed
                    data: {}

                failed:
                  summary: 주문 실패
                  value: |
                    event: failed
                    data: {"failure_reason": "재고 부족"}

                cancelled:
                  summary: 주문 취소 완료
                  value: |
                    event: cancelled
                    data: {}
        "404":
          description: 주문을 찾을 수 없음

  /api/v3/orders/{orderId}/cancel:
    post:
      tags: [Order]
      operationId: cancelOrder
      summary: 주문 취소
      description: |
        주문을 취소합니다. (OPTIONAL_AUTH)

        - `X-Kiosk-Id` 헤더가 없으면 기본값 `1`을 사용합니다.
        - 주문을 생성한 키오스크와 동일한 `X-Kiosk-Id` 여야 취소가 허용됩니다.
        - 회원/비회원 구분 없이 키오스크 ID만으로 소유권을 검증합니다.
      parameters:
        - name: orderId
          in: path
          required: true
          description: 취소할 주문 ID
          schema:
            type: integer
            format: int64
          example: 1001
        - name: X-Kiosk-Id
          in: header
          required: false
          description: 키오스크 식별자. 없으면 `1`
          schema:
            type: string
            default: "1"
          example: "1"
      security:
        - {}
        - BearerAuth: []
      responses:
        "200":
          description: 취소 요청 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                order_id: 1001
                status: "CANCEL_REQUESTED"
                failure_reason: "사용자에 의해 주문이 취소되었습니다"
        "401":
          description: 잘못된 토큰
        "403":
          description: 다른 키오스크에서 생성된 주문
        "404":
          description: 주문을 찾을 수 없음
        "409":
          description: 취소 불가 상태의 주문

  # ───────────────────────────────────────────────
  # Wallet
  # ───────────────────────────────────────────────
  /api/v3/wallet/point:
    get:
      tags: [Wallet]
      operationId: getWalletPoint
      summary: 포인트 잔액 조회
      description: 로그인한 회원의 현재 포인트 잔액을 반환합니다. (AUTHENTICATED)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletPointResponse'
              example:
                point: 3500
        "401":
          description: 인증 실패

  /api/v3/wallet/charges:
    get:
      tags: [Wallet]
      operationId: getChargeHistory
      summary: 포인트 충전 내역 조회
      description: 로그인한 회원의 전체 포인트 충전/차감 내역을 반환합니다. (AUTHENTICATED)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChargeLogResult'
        "401":
          description: 인증 실패

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Authorization: Bearer <JWT 토큰>"

  schemas:
    # ── Auth ──────────────────────────────────────
    MemberRegisterRequest:
      type: object
      required: [user_ci_number, user_name, user_email, password]
      properties:
        user_ci_number:
          type: string
          description: 학생 CI 번호
        user_name:
          type: string
          maxLength: 55
          description: 이름
        user_phone:
          type: string
          nullable: true
          description: 전화번호
        user_email:
          type: string
          format: email
          description: 이메일
        password:
          type: string
          minLength: 8
          maxLength: 16
          description: 비밀번호 (8~16자)

    MemberLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    KioskLoginRequest:
      type: object
      required: [user_barcode, user_pin]
      properties:
        user_barcode:
          type: string
          description: 학생증 바코드
        user_pin:
          type: string
          description: PIN 번호

    # ── Member ─────────────────────────────────────
    UserPreOrderInfoResponse:
      type: object
      properties:
        user_name:
          type: string
          description: 회원 이름
        point:
          type: integer
          description: 보유 포인트

    # ── Item ───────────────────────────────────────
    ItemListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemResponse'

    ItemResponse:
      type: object
      properties:
        item_id:
          type: integer
          format: int64
        name:
          type: string
        category:
          type: string
          description: 상품 카테고리
        price:
          type: integer
        quantity:
          type: integer
          description: 재고 수량
        barcode:
          type: string
          nullable: true

    ItemLookupListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemLookupResponse'

    ItemLookupResponse:
      type: object
      properties:
        item_id:
          type: integer
          format: int64
        name:
          type: string
        barcode:
          type: string
          nullable: true
        price:
          type: integer
        is_active:
          type: boolean
          description: 판매 활성 여부

    ItemCategoryListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            type: string

    CreateItemRequest:
      type: object
      required: [name, category, price, quantity]
      properties:
        name:
          type: string
        category:
          type: string
          description: 상품 카테고리
        price:
          type: integer
        barcode:
          type: string
          nullable: true
        quantity:
          type: integer
          minimum: 0

    ItemUpdateRequest:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: integer
        barcode:
          type: string
          nullable: true
        quantity:
          type: integer

    # ── AriPick ───────────────────────────────────
    CreateAripickRequest:
      type: object
      required: [typeNSeq, reason]
      properties:
        typeNSeq:
          type: integer
          format: int64
        reason:
          type: string

    AripickFoodSearchResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AripickFoodSearchItemResponse'

    AripickFoodSearchItemResponse:
      type: object
      properties:
        typeNSeq:
          type: integer
          format: int64
        name:
          type: string
        company:
          type: string
        kcalInfo:
          type: string

    CreateAripickBlockedKeywordRequest:
      type: object
      required: [keyword]
      properties:
        keyword:
          type: string

    AripickBlockedKeywordResponse:
      type: object
      properties:
        keywordId:
          type: integer
          format: int64
        keyword:
          type: string
        registeredDate:
          type: string
          format: date

    AripickBlockedKeywordListResponse:
      type: object
      properties:
        keywords:
          type: array
          items:
            $ref: '#/components/schemas/AripickBlockedKeywordResponse'

    AripickListResponse:
      type: object
      properties:
        aripickItems:
          type: array
          items:
            $ref: '#/components/schemas/AripickResponse'

    AripickResponse:
      type: object
      properties:
        proposalId:
          type: integer
          format: int64
        name:
          type: string
        reason:
          type: string
        proposerId:
          type: integer
          format: int64
        proposalDate:
          type: string
          format: date
        status:
          type: string
          enum: [검토중, 승인됨, 거절됨]
        likeCount:
          type: integer

    AripickLikeToggleResponse:
      type: object
      properties:
        proposalId:
          type: integer
          format: int64
        liked:
          type: boolean
        likeCount:
          type: integer

    AripickStatsResponse:
      type: object
      properties:
        totalProposals:
          type: integer
          format: int64
        approved:
          type: integer
          format: int64
        pending:
          type: integer
          format: int64
        rejected:
          type: integer
          format: int64

    # ── Order ──────────────────────────────────────
    OrderRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          description: 주문 상품 목록 (`orderInfos` 별칭 허용)
          items:
            $ref: '#/components/schemas/OrderItemRequest'

    OrderItemRequest:
      type: object
      required: [item_id, quantity]
      properties:
        item_id:
          type: integer
          format: int64
        quantity:
          type: integer
          minimum: 1

    OrderResponse:
      type: object
      properties:
        order_id:
          type: integer
          format: int64
          description: 주문 ID
        status:
          $ref: '#/components/schemas/OrderStatus'
        failure_reason:
          type: string
          nullable: true
          description: 실패/취소 사유

    OrderStatus:
      type: string
      description: |
        주문 상태 값.

        **최종 상태** (SSE 연결이 자동 종료됨):
        - `COMPLETED` — 주문 완료
        - `FAILED` — 주문 실패 (재고 부족, 상품 미존재 등)
        - `CANCELLED` — 주문 취소 완료
        - `COMPENSATION_FAILED` — 보상 트랜잭션 실패
        - `TIMED_OUT` — 처리 시간 초과

        **중간 상태**:
        - `PENDING` — 초기 상태
        - `PROCESSING` — 처리 중
        - `CANCEL_REQUESTED` — 취소 요청됨
        - `COMPENSATING` — 보상 처리 중
      enum:
        - PENDING
        - PROCESSING
        - COMPLETED
        - FAILED
        - CANCEL_REQUESTED
        - COMPENSATING
        - CANCELLED
        - COMPENSATION_FAILED
        - TIMED_OUT

    # ── Wallet ─────────────────────────────────────
    WalletPointResponse:
      type: object
      properties:
        point:
          type: integer
          description: 현재 포인트 잔액

    ChargeLogResult:
      type: object
      properties:
        charge_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        charge_date:
          type: string
          format: date-time
        charge_amount:
          type: integer
          description: 변동 포인트량 (음수면 차감)
        payment_id:
          type: integer
          format: int64
          nullable: true
        before_point:
          type: integer
        after_point:
          type: integer
        reason:
          type: string
          nullable: true

    # ── Common ─────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: 오류 메시지
