services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  member-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_MODULE: "domains:member:member-bootstrap"
        APP_BUILD_DIR: "domains/member/member-bootstrap/build/libs"
        APP_JAR_NAME: "member-api.jar"
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/occount_member?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-bG9jYWxEZXZTZWNyZXRLZXlNdXN0QmVBdExlYXN0MzJDaGFyc0xvbmc=}
      JWT_ACCESS_EXPIRATION_TIME: ${JWT_ACCESS_EXPIRATION_TIME:-3600000}
      JWT_KIOSK_EXPIRATION_TIME: ${JWT_KIOSK_EXPIRATION_TIME:-86400000}
      JWT_PREFIX: ${JWT_PREFIX:-Bearer}
      JWT_HEADER: ${JWT_HEADER:-Authorization}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v3/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  item-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_MODULE: "domains:item:item-bootstrap"
        APP_BUILD_DIR: "domains/item/item-bootstrap/build/libs"
        APP_JAR_NAME: "item-api.jar"
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/occount_item?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-bG9jYWxEZXZTZWNyZXRLZXlNdXN0QmVBdExlYXN0MzJDaGFyc0xvbmc=}
      JWT_ACCESS_EXPIRATION_TIME: ${JWT_ACCESS_EXPIRATION_TIME:-3600000}
      JWT_KIOSK_EXPIRATION_TIME: ${JWT_KIOSK_EXPIRATION_TIME:-86400000}
      JWT_PREFIX: ${JWT_PREFIX:-Bearer}
      JWT_HEADER: ${JWT_HEADER:-Authorization}
      OCCOUNT_TOSS_API_URL: ${OCCOUNT_TOSS_API_URL:-}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v3/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  order-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_MODULE: "domains:order:order-bootstrap"
        APP_BUILD_DIR: "domains/order/order-bootstrap/build/libs"
        APP_JAR_NAME: "order-api.jar"
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/occount_order?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-bG9jYWxEZXZTZWNyZXRLZXlNdXN0QmVBdExlYXN0MzJDaGFyc0xvbmc=}
      JWT_ACCESS_EXPIRATION_TIME: ${JWT_ACCESS_EXPIRATION_TIME:-3600000}
      JWT_KIOSK_EXPIRATION_TIME: ${JWT_KIOSK_EXPIRATION_TIME:-86400000}
      JWT_PREFIX: ${JWT_PREFIX:-Bearer}
      JWT_HEADER: ${JWT_HEADER:-Authorization}
      ITEM_SERVICE_BASE_URL: http://item-api:8080/api/v3
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      item-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v3/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  payment-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_MODULE: "domains:payment:payment-bootstrap"
        APP_BUILD_DIR: "domains/payment/payment-bootstrap/build/libs"
        APP_JAR_NAME: "payment-api.jar"
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/occount_payment?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-bG9jYWxEZXZTZWNyZXRLZXlNdXN0QmVBdExlYXN0MzJDaGFyc0xvbmc=}
      JWT_ACCESS_EXPIRATION_TIME: ${JWT_ACCESS_EXPIRATION_TIME:-3600000}
      JWT_KIOSK_EXPIRATION_TIME: ${JWT_KIOSK_EXPIRATION_TIME:-86400000}
      JWT_PREFIX: ${JWT_PREFIX:-Bearer}
      JWT_HEADER: ${JWT_HEADER:-Authorization}
      MEMBER_API_URL: http://member-api:8080
      VAN_API_HOST: ${VAN_API_HOST:-}
      VAN_API_PORT: ${VAN_API_PORT:-0}
      VAN_API_PROTOCOL_STX: ${VAN_API_PROTOCOL_STX:-02}
      VAN_API_PROTOCOL_ETX: ${VAN_API_PROTOCOL_ETX:-03}
      VAN_API_PROTOCOL_SEPARATOR: ${VAN_API_PROTOCOL_SEPARATOR:-1c}
      VAN_API_PROTOCOL_RECORD_SEPARATOR: ${VAN_API_PROTOCOL_RECORD_SEPARATOR:-1e}
      VAN_API_PROTOCOL_BLANK: ${VAN_API_PROTOCOL_BLANK:-20}
      VAN_API_PROTOCOL_ACK: ${VAN_API_PROTOCOL_ACK:-06}
      VAN_API_PROTOCOL_DLE: ${VAN_API_PROTOCOL_DLE:-10}
      VAN_API_PROTOCOL_FORM_FEED: ${VAN_API_PROTOCOL_FORM_FEED:-0c}
      VAN_API_PROTOCOL_NAK: ${VAN_API_PROTOCOL_NAK:-15}
      VAN_API_PROTOCOL_TRANSACTION_TIMEOUT_SECONDS: ${VAN_API_PROTOCOL_TRANSACTION_TIMEOUT_SECONDS:-30}
      VAN_API_MESSAGE_PAYMENT_SERVICE_TYPE: ${VAN_API_MESSAGE_PAYMENT_SERVICE_TYPE:-0101}
      VAN_API_MESSAGE_REFUND_SERVICE_TYPE: ${VAN_API_MESSAGE_REFUND_SERVICE_TYPE:-2101}
      VAN_API_MESSAGE_TRANSACTION_TYPE: ${VAN_API_MESSAGE_TRANSACTION_TYPE:-01}
      VAN_API_MESSAGE_INSTALLMENT_MONTHS: ${VAN_API_MESSAGE_INSTALLMENT_MONTHS:-00}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      member-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v3/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_MODULE: "gateway:api-gateway"
        APP_BUILD_DIR: "gateway/api-gateway/build/libs"
        APP_JAR_NAME: "api-gateway.jar"
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MEMBER_API_URL: http://member-api:8080
      ITEM_API_URL: http://item-api:8080
      ORDER_API_URL: http://order-api:8080
      PAYMENT_API_URL: http://payment-api:8080
      JWT_ACCESS_EXPIRATION_TIME: ${JWT_ACCESS_EXPIRATION_TIME:-3600000}
      JWT_KIOSK_EXPIRATION_TIME: ${JWT_KIOSK_EXPIRATION_TIME:-86400000}
      JWT_PREFIX: ${JWT_PREFIX:-Bearer}
      JWT_HEADER: ${JWT_HEADER:-Authorization}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-bG9jYWxEZXZTZWNyZXRLZXlNdXN0QmVBdExlYXN0MzJDaGFyc0xvbmc=}
    depends_on:
      member-api:
        condition: service_healthy
      item-api:
        condition: service_healthy
      order-api:
        condition: service_healthy
      payment-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v3/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  mysql-data:
