spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: '*'
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: '*'
                exposedHeaders:
                  - Authorization
                allowCredentials: true
          httpclient:
            connect-timeout: 1000
            response-timeout: 5s
            pool:
              type: fixed
              max-connections: 100
              acquire-timeout: 30000
          routes:
            - id: member-api
              uri: ${MEMBER_API_URL}
              predicates:
                - Path=/api/v3/auth/**,/api/v3/users/**
            - id: item-api
              uri: ${ITEM_API_URL}
              predicates:
                - Path=/api/v3/items/**,/api/v3/ari-pick/**
            - id: order-api
              uri: ${ORDER_API_URL}
              predicates:
                - Path=/api/v3/orders/**
              metadata:
                response-timeout: 35000
            - id: wallet-api
              uri: ${PAYMENT_API_URL}
              predicates:
                - Path=/api/v3/wallet/**

jwt:
  access-expiration-time: ${JWT_ACCESS_EXPIRATION_TIME}
  kiosk-expiration-time: ${JWT_KIOSK_EXPIRATION_TIME}
  prefix: ${JWT_PREFIX}
  header: ${JWT_HEADER}
  secret-key: ${JWT_SECRET_KEY}

app:
  startup-warmup:
    http-endpoints:
      - path: /api/v3/auth/login
        method: POST
        body: '{"email":"warmup@warmup.invalid","password":"x"}'
      - path: /api/v3/items
        method: GET
      - path: /api/v3/orders/00000000-0000-0000-0000-000000000000
        method: GET
      - path: /api/v3/wallet/balance
        method: GET

management:
  tracing:
    sampling:
      probability: 1.0
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[http.client.requests]": true
  endpoints:
    web:
      base-path: /api/v3/actuator
      exposure:
        include: health,prometheus
